apiVersion: v1
kind: ConfigMap
metadata:
  name: avst-config
  namespace: avst
  labels:
    app: amazon-visionary
data:
  FLASK_ENV: "production"
  DB_HOST: "mysql-service"
  DB_PORT: "3306"
  DB_NAME: "coupang_selection"
  REDIS_URL: "redis://redis-service:6379/0"
  REDIS_RESULT_URL: "redis://redis-service:6379/1"
  APP_FRONTEND_URL: "https://your-domain.com"
  CELERY_BROKER_URL: "redis://redis-service:6379/0"
  CELERY_RESULT_BACKEND: "redis://redis-service:6379/1"
---
apiVersion: v1
kind: Secret
metadata:
  name: avst-secrets
  namespace: avst
  labels:
    app: amazon-visionary
type: Opaque
stringData:
  DB_USER: "avst_user"
  DB_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  FLASK_SECRET_KEY: "CHANGE_ME_RANDOM_SECRET_KEY"
  JWT_SECRET_KEY: "CHANGE_ME_JWT_SECRET_KEY"
  API_KEYS_ENCRYPTION_KEY: "CHANGE_ME_ENCRYPTION_KEY"
  OPENAI_API_KEY: ""
  OPENAI_BASE_URL: ""
  STRIPE_SECRET_KEY: ""
  STRIPE_WEBHOOK_SECRET: ""
  SMTP_PASSWORD: ""
  GOOGLE_CLIENT_SECRET: ""
  GITHUB_CLIENT_SECRET: ""
