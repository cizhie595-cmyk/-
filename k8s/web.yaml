apiVersion: v1
kind: Service
metadata:
  name: web-service
  namespace: avst
  labels:
    app: avst
    component: web
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 5000
      protocol: TCP
  selector:
    app: avst
    component: web
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: avst
  labels:
    app: avst
    component: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: avst
      component: web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: avst
        component: web
    spec:
      containers:
        - name: web
          image: your-registry/avst-web:latest
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: avst-config
            - secretRef:
                name: avst-secrets
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
          volumeMounts:
            - name: app-data
              mountPath: /app/data
            - name: app-logs
              mountPath: /app/logs
      volumes:
        - name: app-data
          persistentVolumeClaim:
            claimName: avst-data-pvc
        - name: app-logs
          emptyDir: {}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: web-hpa
  namespace: avst
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: web
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: avst-data-pvc
  namespace: avst
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: standard
  resources:
    requests:
      storage: 10Gi
