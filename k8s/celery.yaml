## Celery Worker - Scraping Queue
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-scraping
  namespace: avst
  labels:
    app: celery-scraping
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-scraping
  template:
    metadata:
      labels:
        app: celery-scraping
    spec:
      containers:
        - name: celery-scraping
          image: your-registry/avst-web:latest
          command: ["celery", "-A", "celery_app.celery", "worker",
                    "--loglevel=info", "--concurrency=2",
                    "-Q", "scraping", "-n", "scraping@%h"]
          envFrom:
            - configMapRef:
                name: avst-config
            - secretRef:
                name: avst-secrets
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            exec:
              command: ["celery", "-A", "celery_app.celery", "inspect", "ping",
                        "-d", "celery@scraping"]
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 10
---
## Celery Worker - Analysis Queue
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-analysis
  namespace: avst
  labels:
    app: celery-analysis
spec:
  replicas: 2
  selector:
    matchLabels:
      app: celery-analysis
  template:
    metadata:
      labels:
        app: celery-analysis
    spec:
      containers:
        - name: celery-analysis
          image: your-registry/avst-web:latest
          command: ["celery", "-A", "celery_app.celery", "worker",
                    "--loglevel=info", "--concurrency=4",
                    "-Q", "analysis", "-n", "analysis@%h"]
          envFrom:
            - configMapRef:
                name: avst-config
            - secretRef:
                name: avst-secrets
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
---
