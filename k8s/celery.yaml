## Celery Beat - Scheduled Tasks
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-beat
  namespace: avst
  labels:
    app: celery-beat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-beat
  template:
    metadata:
      labels:
        app: celery-beat
    spec:
      containers:
        - name: celery-beat
          image: your-registry/avst-web:latest
          command: ["celery", "-A", "celery_app.celery", "beat",
                    "--loglevel=info"]
          envFrom:
            - configMapRef:
                name: avst-config
            - secretRef:
                name: avst-secrets
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
