<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=380">
    <title>AVST 选品助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 380px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 13px;
            color: #1f2937;
            background: #f9fafb;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px 20px;
        }

        .header h1 {
            font-size: 16px;
            font-weight: 600;
        }

        .header p {
            font-size: 11px;
            opacity: 0.8;
            margin-top: 4px;
        }

        .content { padding: 16px 20px; }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            background: white;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            margin-bottom: 16px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef4444;
        }

        .status-dot.connected { background: #22c55e; }

        .status-text { font-size: 12px; color: #6b7280; }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 4px;
        }

        .form-group input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 13px;
            outline: none;
            transition: border-color 0.15s;
        }

        .form-group input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.2);
        }

        .btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover { opacity: 0.9; }

        .btn-secondary {
            background: white;
            color: #374151;
            border: 1px solid #d1d5db;
            margin-top: 8px;
        }

        .btn-secondary:hover { background: #f3f4f6; }

        .message {
            margin-top: 12px;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            display: none;
        }

        .message.success { display: block; background: #ecfdf5; color: #065f46; }
        .message.error { display: block; background: #fef2f2; color: #991b1b; }

        .section-title {
            font-size: 12px;
            font-weight: 600;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .divider {
            height: 1px;
            background: #e5e7eb;
            margin: 16px 0;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Amazon Visionary Sourcing Tool</h1>
        <p>跨境电商智能选品助手 v1.0.0</p>
    </div>

    <div class="content">
        <!-- 连接状态 -->
        <div class="status-bar">
            <div class="status-dot" id="statusDot"></div>
            <span class="status-text" id="statusText">检查连接中...</span>
        </div>

        <!-- 服务器配置 -->
        <div class="section-title">服务器配置</div>
        <div class="form-group">
            <label for="apiBase">API 地址</label>
            <input type="text" id="apiBase" placeholder="http://localhost:5000">
        </div>

        <div class="divider"></div>

        <!-- 登录 -->
        <div class="section-title">账号登录</div>
        <div class="form-group">
            <label for="username">用户名 / 邮箱</label>
            <input type="text" id="username" placeholder="请输入用户名或邮箱">
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" placeholder="请输入密码">
        </div>

        <button class="btn btn-primary" id="loginBtn">登录</button>
        <button class="btn btn-secondary" id="saveConfigBtn">保存配置</button>

        <div class="message" id="message"></div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
