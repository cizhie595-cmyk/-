# ============================================================
# Coupang/Amazon 跨境电商智能选品系统 - Docker Compose
# 一键启动: docker-compose up -d
#
# 安全提示:
#   1. 生产环境必须修改所有密钥和密码
#   2. 建议创建 .env 文件配置所有环境变量
#   3. 不要将 .env 文件提交到版本控制
# ============================================================

version: "3.8"

services:
  # ---- MySQL 数据库 ----
  mysql:
    image: mysql:8.0
    container_name: avst-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-avst_root_2026}
      MYSQL_DATABASE: ${DB_NAME:-coupang_selection}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    # 生产环境建议注释掉端口映射，仅允许内部网络访问
    # ports:
    #   - "${DB_PORT:-3306}:3306"
    expose:
      - "3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/user_schema.sql:/docker-entrypoint-initdb.d/02_user_schema.sql
      - ./database/migrations:/docker-entrypoint-initdb.d/migrations
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - avst-network

  # ---- Redis (Celery Broker + Cache) ----
  redis:
    image: redis:7-alpine
    container_name: avst-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    # 生产环境建议注释掉端口映射
    # ports:
    #   - "6379:6379"
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - avst-network

  # ---- Flask Web 应用 ----
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: avst-web
    restart: unless-stopped
    ports:
      - "${FLASK_PORT:-5000}:5000"
    environment:
      - FLASK_ENV=${FLASK_ENV:-production}
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD:-avst_root_2026}
      - DB_NAME=${DB_NAME:-coupang_selection}
      - REDIS_URL=redis://redis:6379/0
      - REDIS_RESULT_URL=redis://redis:6379/1
      # 安全密钥 - 生产环境必须修改!
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY:?请在 .env 中设置 FLASK_SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?请在 .env 中设置 JWT_SECRET_KEY}
      - API_KEYS_ENCRYPTION_KEY=${API_KEYS_ENCRYPTION_KEY:-}
      # 第三方 API
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./reports:/app/reports
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - avst-network

  # ---- Celery Worker (抓取队列) ----
  celery-scraping:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: avst-celery-scraping
    restart: unless-stopped
    command: celery -A celery_app.celery worker --loglevel=info --concurrency=2 -Q scraping -n scraping@%h
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD:-avst_root_2026}
      - DB_NAME=${DB_NAME:-coupang_selection}
      - REDIS_URL=redis://redis:6379/0
      - REDIS_RESULT_URL=redis://redis:6379/1
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-}
      - API_KEYS_ENCRYPTION_KEY=${API_KEYS_ENCRYPTION_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - avst-network

  # ---- Celery Worker (分析队列) ----
  celery-analysis:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: avst-celery-analysis
    restart: unless-stopped
    command: celery -A celery_app.celery worker --loglevel=info --concurrency=4 -Q analysis -n analysis@%h
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD:-avst_root_2026}
      - DB_NAME=${DB_NAME:-coupang_selection}
      - REDIS_URL=redis://redis:6379/0
      - REDIS_RESULT_URL=redis://redis:6379/1
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-}
      - API_KEYS_ENCRYPTION_KEY=${API_KEYS_ENCRYPTION_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - avst-network

  # ---- Celery Worker (3D 生成队列) ----
  celery-threed:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: avst-celery-threed
    restart: unless-stopped
    command: celery -A celery_app.celery worker --loglevel=info --concurrency=2 -Q threed -n threed@%h
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD:-avst_root_2026}
      - DB_NAME=${DB_NAME:-coupang_selection}
      - REDIS_URL=redis://redis:6379/0
      - REDIS_RESULT_URL=redis://redis:6379/1
      - API_KEYS_ENCRYPTION_KEY=${API_KEYS_ENCRYPTION_KEY:-}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - avst-network

  # ---- Celery Beat (定时任务) ----
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: avst-celery-beat
    restart: unless-stopped
    command: celery -A celery_app.celery beat --loglevel=info
    environment:
      - REDIS_URL=redis://redis:6379/0
      - REDIS_RESULT_URL=redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - avst-network

  # ---- Flower (Celery 监控面板, 可选) ----
  # 生产环境建议添加 basic_auth 或移除此服务
  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: avst-flower
    restart: unless-stopped
    command: celery -A celery_app.celery flower --port=5555 --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-changeme}
    ports:
      - "5555:5555"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - REDIS_RESULT_URL=redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - avst-network

volumes:
  mysql_data:
  redis_data:

networks:
  avst-network:
    driver: bridge
