name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Style Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: pip install flake8 isort

      - name: Run flake8 (syntax & import errors only)
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics \
            --exclude=.git,__pycache__,venv,node_modules,.eggs

      - name: Check import ordering
        run: isort --check-only --diff --skip venv --skip .git .
        continue-on-error: true

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    env:
      FLASK_ENV: testing
      TESTING: "1"
      JWT_SECRET_KEY: ci-test-secret-key
      FLASK_SECRET_KEY: ci-test-flask-secret

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run module smoke tests
        run: python tests/test_all_modules.py

      - name: Run API integration tests
        run: python tests/test_api_integration.py

  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t coupang-selection:ci-${{ github.sha }} .

      - name: Verify container starts
        run: |
          docker run -d --name test-container \
            -e FLASK_SECRET_KEY=ci-test \
            -e JWT_SECRET_KEY=ci-test \
            -p 5000:5000 \
            coupang-selection:ci-${{ github.sha }}
          sleep 5
          curl -f http://localhost:5000/api/health || exit 1
          docker stop test-container
          docker rm test-container
