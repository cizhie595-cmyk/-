{% extends "base.html" %}
{% block title %}Team Management{% endblock %}

{% block content %}
<div class="page-header">
    <h2 data-i18n="team.title">Team Management</h2>
    <p class="text-muted">Manage your team members, roles, and shared projects</p>
</div>

<!-- Team Info Card -->
<div class="card" id="team-info-card" style="margin-bottom:24px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <h3 style="margin:0;">My Team</h3>
        <button class="btn btn-primary" onclick="showCreateTeamModal()" id="btn-create-team">Create Team</button>
    </div>
    <div id="team-info">
        <div class="skeleton" style="height:80px;border-radius:8px;"></div>
    </div>
</div>

<!-- Members Table -->
<div class="card" id="members-card" style="margin-bottom:24px;display:none;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <h3 style="margin:0;" data-i18n="team.members">Members</h3>
        <button class="btn btn-primary" onclick="showInviteModal()">Invite Member</button>
    </div>
    <table class="data-table" style="width:100%;">
        <thead>
            <tr>
                <th>User</th>
                <th>Email</th>
                <th>Role</th>
                <th>Joined</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="members-list"></tbody>
    </table>
</div>

<!-- Shared Projects -->
<div class="card" id="shared-projects-card" style="display:none;">
    <h3 style="margin-bottom:16px;" data-i18n="team.shared_projects">Shared Projects</h3>
    <div id="shared-projects-list">
        <p class="text-muted">No shared projects yet.</p>
    </div>
</div>

<!-- Create Team Modal -->
<div id="create-team-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:none;align-items:center;justify-content:center;">
    <div style="background:var(--surface);border-radius:16px;padding:32px;width:420px;max-width:90vw;">
        <h3 style="margin-bottom:16px;" data-i18n="team.create_team">Create Team</h3>
        <div class="form-group" style="margin-bottom:16px;">
            <label class="form-label">Team Name</label>
            <input type="text" id="team-name-input" class="form-input" placeholder="e.g. My Sourcing Team">
        </div>
        <div style="display:flex;gap:12px;justify-content:flex-end;">
            <button class="btn" onclick="hideModals()">Cancel</button>
            <button class="btn btn-primary" onclick="createTeam()">Create</button>
        </div>
    </div>
</div>

<!-- Invite Modal -->
<div id="invite-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;">
    <div style="background:var(--surface);border-radius:16px;padding:32px;width:420px;max-width:90vw;">
        <h3 style="margin-bottom:16px;">Invite Member</h3>
        <div class="form-group" style="margin-bottom:16px;">
            <label class="form-label">Email Address</label>
            <input type="email" id="invite-email" class="form-input" placeholder="colleague@example.com">
        </div>
        <div class="form-group" style="margin-bottom:16px;">
            <label class="form-label">Role</label>
            <select id="invite-role" class="form-select">
                <option value="member">Member</option>
                <option value="admin">Admin</option>
                <option value="viewer">Viewer</option>
            </select>
        </div>
        <div style="display:flex;gap:12px;justify-content:flex-end;">
            <button class="btn" onclick="hideModals()">Cancel</button>
            <button class="btn btn-primary" onclick="inviteMember()">Send Invite</button>
        </div>
    </div>
</div>

<script>
let currentTeam = null;

async function loadTeam() {
    try {
        const res = await api.request('GET', '/v1/teams');
        const teams = (res && res.data && res.data.teams) || (res && res.teams) || [];
        if (teams.length > 0) {
            currentTeam = teams[0];
            renderTeamInfo(currentTeam);
            loadMembers(currentTeam.id);
            document.getElementById('members-card').style.display = 'block';
            document.getElementById('shared-projects-card').style.display = 'block';
            document.getElementById('btn-create-team').style.display = 'none';
        } else {
            document.getElementById('team-info').innerHTML = `
                <div style="text-align:center;padding:32px;color:var(--text-muted);">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:12px;opacity:.5;"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    <p>You don't have a team yet. Create one to collaborate with your colleagues.</p>
                </div>`;
        }
    } catch (e) {
        document.getElementById('team-info').innerHTML = `
            <div style="text-align:center;padding:32px;color:var(--text-muted);">
                <p>Unable to load team info. Please check your connection.</p>
            </div>`;
    }
}

function renderTeamInfo(team) {
    document.getElementById('team-info').innerHTML = `
        <div style="display:flex;align-items:center;gap:16px;padding:16px;background:var(--bg);border-radius:12px;">
            <div style="width:56px;height:56px;border-radius:12px;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:700;color:white;">
                ${(team.name || 'T')[0].toUpperCase()}
            </div>
            <div style="flex:1;">
                <div style="font-size:1.1rem;font-weight:600;">${team.name || 'My Team'}</div>
                <div class="text-muted" style="font-size:0.85rem;">${team.member_count || 1} member(s) &middot; ${team.role || 'owner'}</div>
            </div>
        </div>`;
}

async function loadMembers(teamId) {
    try {
        const res = await api.request('GET', `/v1/teams/${teamId}/members`);
        const members = (res && res.data && res.data.members) || (res && res.members) || [];
        const tbody = document.getElementById('members-list');
        if (!members.length) {
            tbody.innerHTML = '<tr><td colspan="5" class="text-muted" style="text-align:center;padding:24px;">No members yet</td></tr>';
            return;
        }
        tbody.innerHTML = members.map(m => `
            <tr>
                <td style="font-weight:500;">${m.username || m.email}</td>
                <td>${m.email || '-'}</td>
                <td><span class="badge badge-${m.role === 'owner' ? 'primary' : m.role === 'admin' ? 'warning' : 'default'}">${m.role}</span></td>
                <td>${formatDate(m.joined_at || m.created_at)}</td>
                <td>${m.role !== 'owner' ? `<button class="btn btn-sm" onclick="removeMember('${teamId}','${m.user_id}')">Remove</button>` : ''}</td>
            </tr>
        `).join('');
    } catch (e) {}
}

function showCreateTeamModal() {
    document.getElementById('create-team-modal').style.display = 'flex';
}
function showInviteModal() {
    document.getElementById('invite-modal').style.display = 'flex';
}
function hideModals() {
    document.getElementById('create-team-modal').style.display = 'none';
    document.getElementById('invite-modal').style.display = 'none';
}

async function createTeam() {
    const name = document.getElementById('team-name-input').value.trim();
    if (!name) { showToast('Please enter a team name', 'error'); return; }
    try {
        await api.request('POST', '/v1/teams', { name });
        showToast('Team created successfully!', 'success');
        hideModals();
        loadTeam();
    } catch (e) {
        showToast('Failed to create team', 'error');
    }
}

async function inviteMember() {
    if (!currentTeam) return;
    const email = document.getElementById('invite-email').value.trim();
    const role = document.getElementById('invite-role').value;
    if (!email) { showToast('Please enter an email', 'error'); return; }
    try {
        await api.request('POST', `/v1/teams/${currentTeam.id}/invite`, { email, role });
        showToast('Invitation sent!', 'success');
        hideModals();
        loadMembers(currentTeam.id);
    } catch (e) {
        showToast('Failed to send invitation', 'error');
    }
}

async function removeMember(teamId, userId) {
    if (!confirm('Remove this member from the team?')) return;
    try {
        await api.request('DELETE', `/v1/teams/${teamId}/members/${userId}`);
        showToast('Member removed', 'success');
        loadMembers(teamId);
    } catch (e) {
        showToast('Failed to remove member', 'error');
    }
}

// Init
loadTeam();
</script>
{% endblock %}
