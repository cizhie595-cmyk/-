<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Amazon Visionary{% endblock %} - Sourcing Tool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="/static/css/responsive.css">
    <link rel="stylesheet" href="/static/css/i18n.css">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar Overlay (Mobile) -->
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                        <rect width="28" height="28" rx="6" fill="url(#logo-grad)"/>
                        <path d="M8 14L12 18L20 10" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <defs><linearGradient id="logo-grad" x1="0" y1="0" x2="28" y2="28"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#06b6d4"/></linearGradient></defs>
                    </svg>
                    <h1>Visionary</h1>
                </div>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">Main</div>
                    <a href="/dashboard" class="nav-item {% if active_page == 'dashboard' %}active{% endif %}">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                        <span>Dashboard</span>
                    </a>
                    <a href="/projects/new" class="nav-item {% if active_page == 'new_project' %}active{% endif %}">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
                        <span>New Project</span>
                    </a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">Analysis</div>
                    <a href="/market" class="nav-item {% if active_page == 'market' %}active{% endif %}">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                        <span>Market Analysis</span>
                    </a>
                    <a href="/profit" class="nav-item {% if active_page == 'profit' %}active{% endif %}">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                        <span>Profit Calculator</span>
                    </a>
                    <a href="/3d-lab" class="nav-item {% if active_page == '3d_lab' %}active{% endif %}">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                        <span>3D Lab</span>
                    </a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">Settings</div>
                    <a href="/settings/api-keys" class="nav-item {% if active_page == 'api_keys' %}active{% endif %}">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
                        <span>API Keys</span>
                    </a>
                    <a href="/settings/ai" class="nav-item {% if active_page == 'ai_settings' %}active{% endif %}">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7h1.27c.34-.6.99-1 1.73-1a2 2 0 1 1 0 4c-.74 0-1.39-.4-1.73-1H21a7 7 0 0 1-7 7v1.27c.6.34 1 .99 1 1.73a2 2 0 1 1-4 0c0-.74.4-1.39 1-1.73V23a7 7 0 0 1-7-7H3.73c-.34.6-.99 1-1.73 1a2 2 0 1 1 0-4c.74 0 1.39.4 1.73 1H5a7 7 0 0 1 7-7V5.73c-.6-.34-1-.99-1-1.73a2 2 0 0 1 2-2z"/></svg>
                        <span>AI Settings</span>
                    </a>
                    <a href="/settings/subscription" class="nav-item {% if active_page == 'subscription' %}active{% endif %}">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2z"/><path d="M12 6v6l4 2"/></svg>
                        <span>Subscription</span>
                    </a>
                </div>
            </nav>

            <div class="sidebar-footer" style="padding: 16px; border-top: 1px solid var(--border);">
                <!-- 语言切换器 -->
                <div id="language-switcher" style="margin-bottom: 12px;"></div>
                <div class="nav-item" id="user-info" style="margin: 0;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <span id="user-name">Loading...</span>
                </div>
                <div class="nav-item" onclick="logout()" style="margin: 0; color: var(--danger);">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    <span data-i18n="nav.logout">Logout</span>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <div class="main-wrapper">
            <!-- Top Status Bar (PRD 2.1 & 2.2) -->
            <header class="top-status-bar">
                <!-- Sidebar Toggle (Mobile) -->
                <button class="sidebar-toggle" onclick="toggleSidebar()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>

                <!-- Global Search -->
                <div class="global-search">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" id="global-search-input" placeholder="Search ASIN, keyword, or project..." onkeydown="if(event.key==='Enter') globalSearch(this.value)">
                </div>

                <!-- Marketplace Selector -->
                <div class="marketplace-selector">
                    <select id="marketplace-select" class="form-select" style="min-width: 140px; height: 36px; font-size: 0.85rem; padding: 0 12px;">
                        <option value="ATVPDKIKX0DER" selected>Amazon US</option>
                        <option value="A1F83G8C2ARO7P">Amazon UK</option>
                        <option value="A1PA6795UKMFR9">Amazon DE</option>
                        <option value="A1VC38T7YXB528">Amazon JP</option>
                        <option value="A2EUQ1WTGCTBG2">Amazon CA</option>
                        <option value="A1RKKUPIHCS9HS">Amazon ES</option>
                        <option value="A13V1IB3VIYZZH">Amazon FR</option>
                        <option value="APJ6JRA9NG5V4">Amazon IT</option>
                        <option value="A21TJRUUN4KGV">Amazon IN</option>
                        <option value="A39IBJ37TRP1C6">Amazon AU</option>
                    </select>
                </div>

                <!-- API Status Indicators (PRD 2.2) -->
                <div class="api-status-group">
                    <div class="api-status-item" id="status-amazon" title="Amazon SP-API: Checking...">
                        <span class="status-dot status-checking"></span>
                        <span class="status-label">SP-API</span>
                    </div>
                    <div class="api-status-item" id="status-keepa" title="Keepa API: Checking...">
                        <span class="status-dot status-checking"></span>
                        <span class="status-label">Keepa</span>
                    </div>
                    <div class="api-status-item" id="status-openai" title="OpenAI: Checking...">
                        <span class="status-dot status-checking"></span>
                        <span class="status-label">AI</span>
                    </div>
                    <div class="api-status-item" id="status-meshy" title="Meshy 3D: Checking...">
                        <span class="status-dot status-checking"></span>
                        <span class="status-label">3D</span>
                    </div>
                </div>

                <!-- Quota Badge -->
                <div class="quota-badge" id="quota-badge" title="Remaining quota">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                    <span id="quota-count">--</span>
                </div>

                <!-- User Avatar -->
                <div class="user-avatar" id="header-avatar" onclick="window.location.href='/settings/subscription'" title="Account">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </div>
            </header>

            <!-- Page Content -->
            <main class="main-content">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Global Loading Overlay -->
    <div id="global-loading" class="loading-overlay hidden">
        <div class="spinner" style="width: 48px; height: 48px; border-width: 4px;"></div>
    </div>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/i18n.js"></script>
    <script>
        // ========== Global Functions ==========

        // Sidebar toggle (mobile)
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
            document.body.style.overflow = sidebar.classList.contains('open') ? 'hidden' : '';
        }

        // Close sidebar on ESC key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                const sidebar = document.getElementById('sidebar');
                if (sidebar.classList.contains('open')) toggleSidebar();
            }
        });

        // Load user info
        (async function() {
            try {
                const profile = await api.getProfile();
                // 后端返回 {success, data: {username, email, ...}}
                const user = profile && profile.data ? profile.data : (profile && profile.user ? profile.user : null);
                if (user) {
                    document.getElementById('user-name').textContent = user.username || user.email;
                }
            } catch (e) {
                // Not logged in
            }
        })();

        // Check API status indicators
        async function checkApiStatus() {
            const services = ['amazon_sp_api', 'keepa', 'openai', 'meshy'];
            const domIds = ['status-amazon', 'status-keepa', 'status-openai', 'status-meshy'];
            const labels = ['Amazon SP-API', 'Keepa API', 'OpenAI', 'Meshy 3D'];

            try {
                const result = await api.request('GET', '/keys/all');
                if (result && result.services) {
                    services.forEach((svc, i) => {
                        const el = document.getElementById(domIds[i]);
                        const dot = el.querySelector('.status-dot');
                        const svcData = result.services[svc];

                        if (svcData && svcData.configured) {
                            dot.className = 'status-dot status-green';
                            el.title = `${labels[i]}: Connected`;
                        } else {
                            dot.className = 'status-dot status-red';
                            el.title = `${labels[i]}: Not configured`;
                        }
                    });
                }
            } catch (e) {
                // Set all to unknown
                domIds.forEach(id => {
                    const el = document.getElementById(id);
                    if (el) el.querySelector('.status-dot').className = 'status-dot status-yellow';
                });
            }
        }

        // Check quota
        async function checkQuota() {
            try {
                const result = await api.request('GET', '/v1/user/quota');
                if (result && result.success) {
                    const total = (result.scrape_remaining || 0) + (result.analysis_remaining || 0);
                    document.getElementById('quota-count').textContent = total;
                }
            } catch (e) {
                document.getElementById('quota-count').textContent = '--';
            }
        }

        // Global search
        function globalSearch(query) {
            if (!query.trim()) return;
            // ASIN pattern: 10 alphanumeric starting with B0
            if (/^B0[A-Z0-9]{8}$/i.test(query.trim())) {
                window.location.href = `/products/${query.trim()}/analysis`;
            } else {
                window.location.href = `/market?keyword=${encodeURIComponent(query.trim())}`;
            }
        }

        function logout() {
            api.clearToken();
            window.location.href = '/auth/login';
        }

        // Toast notification
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            if (!container) return;
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => { toast.classList.add('toast-show'); }, 10);
            setTimeout(() => {
                toast.classList.remove('toast-show');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // Format helpers
        function formatNumber(n) {
            if (n == null) return '-';
            return new Intl.NumberFormat('en-US').format(n);
        }
        function formatCurrency(n) {
            if (n == null) return '-';
            return '$' + new Intl.NumberFormat('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(n);
        }
        function formatDate(d) {
            if (!d) return '-';
            return new Date(d).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        }
        function formatPercent(n) {
            if (n == null) return '-';
            return n.toFixed(1) + '%';
        }

        // Init status checks
        checkApiStatus();
        checkQuota();
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
