[pytest]
# 测试目录
testpaths = tests

# 测试文件匹配模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 默认命令行参数
addopts =
    -v
    --tb=short
    --strict-markers
    -W ignore::DeprecationWarning

# 自定义标记
markers =
    unit: 单元测试 (不需要外部服务)
    integration: 集成测试 (需要数据库/Redis)
    slow: 耗时较长的测试
    scraper: 爬虫模块测试
    analysis: 分析引擎测试
    auth: 认证模块测试
    api: API 路由测试
    export: 导出功能测试
    payment: 支付相关测试

# 最小 Python 版本
minversion = 7.0

# 日志
log_cli = true
log_cli_level = WARNING

# 过滤警告
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
